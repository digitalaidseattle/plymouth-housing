name: Warm Up Applications

on:
  schedule:
    # Seattle local time (~12 PM – 5 PM PT)
    # GitHub Actions cron uses UTC

    - cron: "*/5 19-23 * * 3,4"
    - cron: "0 0 * * 4,5"

  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest

    env:
      PROD_URL: ${{ secrets.PROD_URL }}
      STAGING_URL: ${{ secrets.STAGING_URL }}

    steps:
      - name: Timestamp
        run: date

      - name: Validate required secrets
        run: |
          if [ -z "${PROD_URL}" ]; then
            echo "PROD_URL secret is missing"
            exit 1
          fi

          if [ -z "${STAGING_URL}" ]; then
            echo "STAGING_URL secret is missing"
            exit 1
          fi

      - name: Warm Production API
        continue-on-error: true
        run: |
          echo "Pinging production API..."

          if curl --max-time 30 -L -o /dev/null \
            -w "Production HTTP Status: %{http_code}\n" \
            "$PROD_URL/api/items"; then
            echo "Production warm-up succeeded"
          else
            echo "::warning::Production warm-up failed"
          fi

      - name: Warm Staging API
        continue-on-error: true
        run: |
          echo "Pinging staging API..."

          if curl --max-time 30 -L -o /dev/null \
            -w "Staging HTTP Status: %{http_code}\n" \
            "$STAGING_URL/api/items"; then
            echo "Staging warm-up succeeded"
          else
            echo "::warning::Staging warm-up failed"
          fi