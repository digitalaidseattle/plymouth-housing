version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    # Ignore patch updates (e.g., 1.0.0 -> 1.0.1)
    # This allows: major updates, minor updates, and security updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
