name: Azure Static Web Apps Dev

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    name: CI
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
