name: Azure Static Web Apps Staging

on:
  push:
    branches:
      - staging

jobs:
  ci:
    runs-on: ubuntu-latest
    name: CI
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  build_and_deploy_job:
    needs: ci
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment: staging # this is a reference to the github environment and determines the env: location below
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token:
            ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_ISLAND_01BE9BF1E
            }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          deployment_environment: 'staging' # this is a reference to the Azure environment for deployment
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: '/' # App source code path
          api_location: '' # Api source code path - optional
          output_location: 'dist' # Built app content directory - optional
          ###### End of Repository/Build Configurations ######
        env:
          VITE_CLARITY_PROJECT_ID: ${{ secrets.VITE_CLARITY_PROJECT_ID }}
          VITE_APPINSIGHTS_CONNECTION_STRING:
            ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
      - name: Post URL
        run: |
          echo "App deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo ${{ steps.builddeploy.outputs.static_web_app_url }} >> $GITHUB_STEP_SUMMARY
